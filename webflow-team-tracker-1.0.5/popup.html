<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webflow Team Tracker</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #09090b;
            --panel: rgba(18, 18, 22, 0.94);
            --panel-strong: rgba(24, 24, 29, 0.98);
            --card: rgba(255, 255, 255, 0.04);
            --card-hover: rgba(255, 255, 255, 0.065);
            --card-active: rgba(34, 197, 94, 0.1);
            --border: rgba(255, 255, 255, 0.09);
            --border-strong: rgba(255, 255, 255, 0.14);
            --text: #fafafa;
            --muted: rgba(250, 250, 250, 0.62);
            --soft: rgba(250, 250, 250, 0.42);
            --brand: #ffffff;
            --accent: #60a5fa;
            --success: #4ade80;
            --warning: #fbbf24;
            --radius: 16px;
            --shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            width: 360px;
            min-height: 200px;
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.16), transparent 38%),
                radial-gradient(circle at top right, rgba(255, 255, 255, 0.06), transparent 28%),
                linear-gradient(180deg, #0b0b0f 0%, #09090b 100%);
            color: var(--text);
            padding: 14px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 24px 24px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.75), transparent);
        }

        .shell {
            position: relative;
            overflow: hidden;
            border-radius: 22px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(18, 18, 22, 0.96), rgba(12, 12, 15, 0.98));
            box-shadow: var(--shadow);
            padding: 18px 16px 14px;
            backdrop-filter: blur(18px);
        }

        .shell::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 22%);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.04)),
                linear-gradient(135deg, #2563eb, #111827);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .header h1 {
            font-size: 15px;
            font-weight: 650;
            letter-spacing: -0.02em;
            color: var(--brand);
        }

        /* Setup Section */
        .setup-section {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 16px;
            margin-bottom: 16px;
        }

        .setup-section label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--soft);
            margin-bottom: 10px;
        }

        .setup-section input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        .setup-section input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(96, 165, 250, 0.55);
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.16);
        }

        .setup-section input::placeholder {
            color: var(--soft);
        }

        .save-btn {
            width: 100%;
            margin-top: 12px;
            padding: 11px 12px;
            background: linear-gradient(180deg, #f8fafc 0%, #e5e7eb 100%);
            color: #09090b;
            border: 1px solid rgba(255, 255, 255, 0.32);
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.16s ease, opacity 0.2s ease;
        }

        .save-btn:hover {
            opacity: 0.96;
            transform: translateY(-1px);
        }

        /* Your Status (small) */
        .your-status-mini {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.025));
            border: 1px solid rgba(96, 165, 250, 0.18);
            border-radius: var(--radius);
            padding: 12px 14px;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .your-status-mini .label {
            font-size: 13px;
            color: var(--muted);
        }

        .your-status-mini .value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            text-align: right;
        }

        /* Account Grid */
        .accounts-section h2 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--soft);
            margin-bottom: 12px;
        }

        .accounts-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .account-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.03));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.18s ease;
        }

        .account-card:hover {
            background: var(--card-hover);
            border-color: var(--border-strong);
            transform: translateY(-1px);
        }

        .account-card.active {
            background: linear-gradient(180deg, rgba(34, 197, 94, 0.12), rgba(255, 255, 255, 0.035));
            border: 1px solid rgba(74, 222, 128, 0.22);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .account-email {
            font-family: "SF Mono", "Roboto Mono", Consolas, monospace;
            font-size: 11px;
            letter-spacing: -0.01em;
            color: #93c5fd;
        }

        .account-user {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .account-user-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            text-align: right;
        }

        .account-user-name.empty {
            color: var(--muted);
            font-weight: 400;
            font-style: normal;
        }

        .account-user-name.idle {
            color: #fcd34d;
            font-weight: 500;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.38);
            animation: pulse 2s infinite;
        }

        .status-dot.inactive {
            background: rgba(255, 255, 255, 0.18);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .account-project {
            font-family: "SF Mono", "Roboto Mono", Consolas, monospace;
            font-size: 10px;
            color: var(--soft);
            margin-top: 6px;
        }

        .refresh-info {
            text-align: center;
            font-size: 11px;
            color: var(--soft);
            margin-top: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 28px 18px;
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.025);
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .empty-state small {
            font-size: 11px;
            color: var(--soft);
        }
    </style>
</head>

<body>
    <div class="shell">
        <div class="header">
            <div class="header-icon">W</div>
            <h1>Webflow Team Tracker</h1>
        </div>

        <!-- Setup Section (shown if name not set) -->
        <div id="setup-section" class="setup-section" style="display: none;">
            <label>What's your name?</label>
            <input type="text" id="name-input" placeholder="e.g., Vishal, Rehan, Arth">
            <button class="save-btn" id="save-name-btn">Save</button>
        </div>

        <!-- Your Status (mini bar) -->
        <div id="your-status-mini" class="your-status-mini" style="display: none;">
            <span class="label">You: <strong id="your-name-mini">—</strong></span>
            <span class="value" id="your-account-mini">Not using</span>
        </div>

        <!-- Accounts Section -->
        <div class="accounts-section">
            <h2>Webflow Accounts</h2>
            <div id="accounts-list" class="accounts-list">
                <!-- Accounts will be rendered here -->
            </div>
        </div>

        <div class="refresh-info">Live status with recent activity history</div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
